<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>{% block title %}Admin{% endblock %} - Nieuwburg Blitz</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="https://cdn.tiny.cloud/1/1z73jx2kzcb4ys98fgz5g9y0npcli2yixbchybeswrm4z4af/tinymce/7/tinymce.min.js" referrerpolicy="origin"></script>
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-brand">
        <img src="{{ url_for('static', filename='img/LogoBlackWithTitle.png') }}" alt="Nieuwburg Blitz Logo">
        <span>Admin Panel</span>
      </div>
      <nav class="admin-nav">
        <a href="{{ url_for('admin_dashboard') }}" class="admin-nav-link"><i class="fa-solid fa-chart-line fa-fw"></i>Dashboard</a>
        <a href="{{ url_for('admin_bookings') }}" class="admin-nav-link"><i class="fa-solid fa-calendar-check fa-fw"></i>Bookings</a>
        
        <hr class="nav-divider">

        <a href="{{ url_for('admin_clients') }}" class="admin-nav-link"><i class="fa-solid fa-users fa-fw"></i>Clients</a>
        <a href="{{ url_for('admin_staff') }}" class="admin-nav-link"><i class="fa-solid fa-user-tie fa-fw"></i>Staff</a>
        <a href="{{ url_for('admin_applications') }}" class="admin-nav-link"><i class="fa-solid fa-user-plus fa-fw"></i>Blitz Applications</a>

        <hr class="nav-divider">

        <a href="{{ url_for('admin_quotes') }}" class="admin-nav-link"><i class="fa-solid fa-file-invoice fa-fw"></i>Quotes</a>
        <a href="{{ url_for('admin_invoices') }}" class="admin-nav-link"><i class="fa-solid fa-file-invoice-dollar fa-fw"></i>Invoices</a>
        
        <hr class="nav-divider">

        <a href="{{ url_for('admin_service_categories') }}" class="admin-nav-link"><i class="fa-solid fa-spray-can-sparkles fa-fw"></i>Services</a>
        <a href="{{ url_for('admin_blog') }}" class="admin-nav-link"><i class="fa-solid fa-newspaper fa-fw"></i>Blog</a>
        <a href="{{ url_for('admin_activity_log') }}" class="admin-nav-link"><i class="fa-solid fa-clipboard-list fa-fw"></i>Activity Log</a>
    </nav>
    
      <div class="admin-sidebar-footer">
        <a href="{{ url_for('profile') }}" class="admin-nav-link"><i class="fa-solid fa-user-pen fa-fw"></i>Edit My Profile</a>
        <a href="{{ url_for('index') }}" class="admin-nav-link"><i class="fa-solid fa-globe fa-fw"></i>View Public Site</a>
        <a href="{{ url_for('logout') }}" class="admin-nav-link"><i class="fa-solid fa-right-from-bracket fa-fw"></i>Logout</a>
      </div>
    </aside>
    <main class="admin-main-content">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
